<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HR System</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for("static", filename="css/hr_base.css") }}">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

<h2>HR SYSTEM</h2>

<a href="/dashboard"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="/departments"><i class="fa fa-users"></i> Department</a>
<a href="/employees"><i class="fa fa-users"></i> Employees</a>
<a href="/performance"><i class="fa fa-chart-bar"></i> Performance</a>
<a href="/predictions"><i class="fa fa-brain"></i> ML Predictions</a>
<a href="/decisions"><i class="fa fa-briefcase"></i> HR Decisions</a>
<a href="/notifications"><i class="fa fa-bell"></i> Notifications</a>
<a href="/logout"><i class="fa fa-sign-out-alt"></i> Logout</a>

</div>

<!-- ================= TOPBAR ================= -->
<div class="topbar">

<h3>HR Analytics System</h3>

<div class="user">
<i class="fa fa-user-circle"></i>
<span>{{ session['name'] }}</span>
</div>

</div>

<!-- ================= CONTENT ================= -->
<div class="main">
{% block content %}
{% endblock %}
</div>

</body>
</html>
