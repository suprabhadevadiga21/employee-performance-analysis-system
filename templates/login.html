<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HR System Login</title>

<link rel="stylesheet" href="{{ url_for("static", filename="css/login.css") }}">

</head>

<body>

<div class="login-box">

<h2 id="title">HR Login</h2>

<!-- ✅ FLASH MESSAGE BLOCK -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<!-- ERROR -->
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<!-- LOGIN FORM -->
<form id="loginForm" method="POST" action="/login">

<input type="hidden" name="role" id="role" value="hr">

<input type="email" name="email" placeholder="Enter Email" required>
<input type="password" name="password" placeholder="Password" required>

<div class="terms">
<input type="checkbox" id="termsCheck" required>
<label>I agree to <a id="termsLink" href="/terms">Terms & Conditions</a></label>
</div>

<button type="submit">Login</button>

</form>

<!-- REGISTER FORM -->
<form id="registerForm" method="POST" action="/register" class="hidden">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<div class="terms">
<input type="checkbox" required>
<label>I agree to <a href="/user_terms">Terms & Conditions</a></label>
</div>

<button type="submit">Register</button>

</form>

<div class="switch" onclick="toggleMode()">
Switch Login Mode →
</div>

<div class="register-link hidden" id="registerLink" onclick="toggleRegister()">
New user? Register here
</div>

</div>

<script src="{{ url_for("static", filename="js/login.js") }}"></script>

</body>
</html>
